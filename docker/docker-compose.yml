version: "3.8"

services:
  stormshield-mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: stormshield-mcp
    restart: unless-stopped
    ports:
      - "8765:8765"
    volumes:
      - ../config/config.yaml:/app/config/config.yaml:ro
    environment:
      - PARIS_FW_PASSWORD=${PARIS_FW_PASSWORD:-changeme}
      - LYON_FW_PASSWORD=${LYON_FW_PASSWORD:-changeme}
    command: ["--config", "/app/config/config.yaml", "--transport", "http"]
    healthcheck:
      test: ["CMD", "python", "-c", "from stormshield_mcp.config.loader import load_config; load_config('/app/config/config.yaml')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
